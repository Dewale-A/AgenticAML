name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: agentic-aml

jobs:
  # ---------------------------------------------------------------------------
  # Lint and type checks
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: |
          pip install --upgrade pip
          pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/ --ignore E501,E402

  # ---------------------------------------------------------------------------
  # Test suite
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p /tmp

      - name: Run tests with coverage
        env:
          DB_PATH: /tmp/ci_aml.db
          SEED_ON_START: "false"
          OPENAI_API_KEY: ""
          CASH_THRESHOLD: "5000000"
          TRANSFER_THRESHOLD: "10000000"
          MATERIALITY_THRESHOLD: "50000000"
          CONFIDENCE_GATE_THRESHOLD: "0.7"
          AUTO_BLOCK_SANCTIONS: "true"
          INSTITUTION_NAME: "CI Test Bank"
          INSTITUTION_CODE: "CITEST001"
        run: |
          pytest tests/ \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --asyncio-mode=auto \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Database tests (isolated)
  # ---------------------------------------------------------------------------
  test-database:
    name: Database Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database tests
        env:
          DB_PATH: /tmp/ci_db_aml.db
          SEED_ON_START: "false"
          OPENAI_API_KEY: ""
        run: |
          pytest tests/test_database.py \
            --tb=short \
            --asyncio-mode=auto \
            -v

  # ---------------------------------------------------------------------------
  # Docker build
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker image starts
        run: |
          docker run --rm -d \
            --name aml-ci-test \
            -e DB_PATH=/tmp/test.db \
            -e SEED_ON_START=false \
            -e OPENAI_API_KEY="" \
            -p 8003:8003 \
            ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}

          # Wait for the container to be healthy
          for i in $(seq 1 15); do
            if docker exec aml-ci-test python -c \
              "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')" \
              2>/dev/null; then
              echo "Container is healthy"
              break
            fi
            echo "Waiting for container ($i/15)..."
            sleep 2
          done

          # Confirm health endpoint
          docker exec aml-ci-test python -c \
            "import urllib.request; r = urllib.request.urlopen('http://localhost:8003/health'); print(r.read())"

          docker stop aml-ci-test

      - name: Save image digest
        run: |
          echo "Image built successfully: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}"

  # ---------------------------------------------------------------------------
  # Docker push (main branch only)
  # ---------------------------------------------------------------------------
  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
