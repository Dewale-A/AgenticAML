  <text x="92" y="320" font-size="9" fill="#64748B">System Integration</text>

  <rect x="45" y="355" width="140" height="55" rx="8" fill="white" filter="url(#shadow)"/>
  <circle cx="70" cy="382" r="12" fill="#EDE9FE"/>
